version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "02:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    groups:
      security-and-patch-updates:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
